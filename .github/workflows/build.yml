name: Build and push containers

on:
  push:
    branches: [main]
    paths:
      - 'containers/**'
      - 'versions.json'
  workflow_dispatch:
    inputs:
      tool:
        description: 'Tool to build (leave empty to auto-detect)'
        required: false

jobs:
  # ── Detect which containers changed ────────────────────────────────────────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      tools: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            boltz:
              - 'containers/boltz/**'
            colabfold:
              - 'containers/colabfold/**'
            proteinmpnn:
              - 'containers/proteinmpnn/**'
            boltzgen:
              - 'containers/boltzgen/**'

  # ── Build and push changed containers ──────────────────────────────────────
  build:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.tools != '[]' && needs.detect-changes.outputs.tools != '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tool: ${{ fromJson(needs.detect-changes.outputs.tools) }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version from versions.json
        id: version
        run: |
          echo "version=$(jq -r '.${{ matrix.tool }}.version' versions.json)" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: containers/${{ matrix.tool }}
          push: true
          tags: |
            ghcr.io/mionoyui/${{ matrix.tool }}:${{ steps.version.outputs.version }}
            ghcr.io/mionoyui/${{ matrix.tool }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
