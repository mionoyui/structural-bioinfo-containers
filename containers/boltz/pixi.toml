[workspace]
name = "boltz"
version = "2.2.1"
description = "Boltz-2: biomolecular structure prediction"
channels = ["https://prefix.dev/conda-forge"]
platforms = ["linux-64"]

[system-requirements]
cuda = "12"

[dependencies]
python = "3.11.*"

[pypi-dependencies]
# boltz[cuda] が torch+CUDA依存を含むため、condaからpytorchは入れない
boltz = { version = ">=2.2.1", extras = ["cuda"] }

[tasks]
predict = { cmd = "boltz predict", description = "Run Boltz-2 structure prediction" }
