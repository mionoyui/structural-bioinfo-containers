[workspace]
name = "proteinmpnn"
version = "1.0.1"
description = "ProteinMPNN: protein sequence design"
channels = ["https://prefix.dev/conda-forge", "https://prefix.dev/pytorch"]
platforms = ["linux-64"]

[system-requirements]
cuda = "12"

[dependencies]
python = "3.11.*"
pytorch = "*"
torchvision = "*"
torchaudio = "*"
pytorch-cuda = "12.*"
numpy = ">=1.24.4,<2"
